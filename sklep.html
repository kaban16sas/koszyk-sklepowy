<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Sklep</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
  background: #f0f2f5;
}

h1, h2 {
  text-align: center;
}

#search {
  width: 100%;
  padding: 10px;
  margin-bottom: 20px;
}

.product {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
}

button {
  padding: 6px 12px;
  cursor: pointer;
}

#cart li {
  background: white;
  margin: 10px 0;
  padding: 10px;
  border-radius: 8px;
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.controls button {
  margin: 0 5px;
}

#buyBtn {
  margin-top: 15px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  font-size: 16px;
}

/* POPUP */
#popup {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
}

.popup-box {
  background: white;
  padding: 30px;
  margin: 120px auto;
  width: 300px;
  text-align: center;
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>Sklep 🛒</h1>

<input id="search" placeholder="🔍 Szukaj produktu...">

<div id="products"></div>

<h2>Koszyk (<span id="count">0</span>)</h2>
<ul id="cart"></ul>

<h3>Suma: <span id="total">0</span> zł</h3>

<button id="buyBtn">Kup teraz</button>

<!-- POPUP -->
<div id="popup">
  <div class="popup-box">
    <h2>✅ Dziękujemy za zakupy!</h2>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
class Product {
  constructor(id, name, price) {
    this.id = id;
    this.name = name;
    this.price = price;
  }
}

const products = [
  new Product(1, "Koszulka", 50),
  new Product(2, "Spodnie", 120),
  new Product(3, "Buty", 200),
  new Product(4, "Bluza", 150),
  new Product(5, "Czapka", 40)
];

const productsDiv = document.getElementById("products");
const cartUl = document.getElementById("cart");
const totalSpan = document.getElementById("total");
const countSpan = document.getElementById("count");
const searchInput = document.getElementById("search");
const buyBtn = document.getElementById("buyBtn");
const popup = document.getElementById("popup");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
}

function renderProducts() {
  const search = searchInput.value.toLowerCase();
  productsDiv.innerHTML = "";

  const filtered = products.filter(p => 
    p.name.toLowerCase().includes(search)
  );

  filtered.forEach(p => {
    const div = document.createElement("div");
    div.classList.add("product");

    div.innerHTML = `
      <div>
        <strong>${p.name}</strong><br>
        ${p.price} zł
      </div>
      <button>Dodaj</button>
    `;

    div.querySelector("button").addEventListener("click", () => {
      addToCart(p);
    });

    productsDiv.appendChild(div);
  });
}

function addToCart(product) {
  const existing = cart.find(item => item.id === product.id);

  if (existing) {
    existing.quantity++;
  } else {
    cart.push({ ...product, quantity: 1 });
  }

  saveCart();
  renderCart();
}

function renderCart() {
  cartUl.innerHTML = "";
  let total = 0;
  let count = 0;

  cart.forEach(item => {
    total += item.price * item.quantity;
    count += item.quantity;

    const li = document.createElement("li");

    li.innerHTML = `
      <span>${item.name} (${item.price} zł)</span>
      <div class="controls">
        <button>-</button>
        x${item.quantity}
        <button>+</button>
        <button>❌</button>
      </div>
    `;

    const [minusBtn, plusBtn, delBtn] = li.querySelectorAll("button");

    minusBtn.addEventListener("click", () => {
      item.quantity--;
      if (item.quantity <= 0) {
        cart = cart.filter(i => i.id !== item.id);
      }
      saveCart();
      renderCart();
    });

    plusBtn.addEventListener("click", () => {
      item.quantity++;
      saveCart();
      renderCart();
    });

    delBtn.addEventListener("click", () => {
      cart = cart.filter(i => i.id !== item.id);
      saveCart();
      renderCart();
    });

    cartUl.appendChild(li);
  });

  totalSpan.textContent = total;
  countSpan.textContent = count;
}

buyBtn.addEventListener("click", () => {
  if (cart.length === 0) {
    alert("Koszyk jest pusty!");
    return;
  }

  popup.style.display = "block";

  cart = [];
  saveCart();
  renderCart();
});

function closePopup() {
  popup.style.display = "none";
}

searchInput.addEventListener("input", renderProducts);

renderProducts();
renderCart();
</script>

</body>
</html>
